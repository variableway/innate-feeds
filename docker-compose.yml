version: "3.8"

# This root-level compose is a convenience wrapper around innate-hub.
# For full options (SQLite / PostgreSQL / profiles), use innate-hub/docker-compose.yml directly.

services:
  hub:
    build:
      context: ./innate-hub/backend
      dockerfile: Dockerfile
    container_name: innate-hub
    environment:
      FUSION_DB_PATH: ${FUSION_DB_PATH:-fusion.db}
      FUSION_PASSWORD: ${FUSION_PASSWORD:-innate}
      FUSION_PORT: ${FUSION_PORT:-8080}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      PRODUCTHUNT_TOKEN: ${PRODUCTHUNT_TOKEN:-}
      HUB_EMBEDDER_PROVIDER: ${HUB_EMBEDDER_PROVIDER:-}
      HUB_EMBEDDER_MODEL: ${HUB_EMBEDDER_MODEL:-}
      HUB_EMBEDDER_API_KEY: ${HUB_EMBEDDER_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - hub_data:/data
    restart: unless-stopped

volumes:
  hub_data:
